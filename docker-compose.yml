

services:
  mysql:
    image: mysql:8.0
    container_name: it4788_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: it4788_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
  
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

volumes:
  mysql_data:
