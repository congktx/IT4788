services:
  mysql:
    image: mysql:8.0
    container_name: it4788_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: it4788_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

volumes:
  mysql_data:
